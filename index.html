<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Shuffle Pong</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      color: white;
      cursor: default;
    }
    .pill button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 14px;
      padding: 0 0 0 4px;
      line-height: 1;
    }
    .pill button:hover {
      color: white;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body class="min-h-screen" style="background: #1a1a2e;">
  <div id="app"></div>
  <script>
  // ===== Scheduler Module =====

  const PALETTE = [
    '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#e67e22',
    '#1abc9c', '#2980b9', '#d35400', '#8e44ad', '#27ae60',
    '#c0392b', '#16a085', '#1a5276', '#a93226'
  ];

  /**
   * Decide table formats for N players across at most T tables.
   * Returns an array of player counts per table (2, 3, or 4).
   * Prefers doubles (4) and singles (2). Uses 2v1 (3) only for odd remainders.
   */
  function decideTableFormats(playerCount, tableCount, allow2v1 = true) {
    const maxTables = Math.min(tableCount, Math.floor(playerCount / 2));

    let best = null;

    for (let numTables = 1; numTables <= maxTables; numTables++) {
      for (let d = numTables; d >= 0; d--) {
        const remaining = numTables - d;
        const doublesPlayers = d * 4;

        if (remaining === 0) {
          // All doubles tables
          const seated = doublesPlayers;
          if (seated > playerCount) continue;
          const formats = Array(d).fill(4);
          if (!best || seated > best.seated || (seated === best.seated && (formats.length > best.formats.length || (formats.length === best.formats.length && 0 < best.threes)))) {
            best = { formats, threes: 0, seated };
          }
          continue;
        }

        // Remaining tables are singles (2) or 2v1 (3)
        // Try all valid splits of remaining tables into 3s and 2s
        const maxThrees = allow2v1 ? remaining : 0;
        for (let threes = 0; threes <= maxThrees; threes++) {
          const twos = remaining - threes;
          const seated = doublesPlayers + threes * 3 + twos * 2;
          if (seated > playerCount) continue;

          const formats = Array(d).fill(4);
          for (let i = 0; i < threes; i++) formats.push(3);
          for (let i = 0; i < twos; i++) formats.push(2);

          if (!best
            || seated > best.seated
            || (seated === best.seated && threes < best.threes)
            || (seated === best.seated && threes === best.threes && formats.length > best.formats.length)) {
            best = { formats, threes, seated };
          }
        }
      }
    }

    return best ? best.formats : [];
  }

  /**
   * Get all combinations of `k` items from `arr`.
   */
  function combinations(arr, k) {
    if (k === 0) return [[]];
    if (arr.length < k) return [];
    const [first, ...rest] = arr;
    const withFirst = combinations(rest, k - 1).map(c => [first, ...c]);
    const withoutFirst = combinations(rest, k);
    return [...withFirst, ...withoutFirst];
  }

  /**
   * Score how "costly" it is for groupA to face groupB, based on opponent history.
   * Lower is better. Returns the max opponent count among all cross-pairs.
   */
  function opponentCost(groupA, groupB, players, opponentMatrix) {
    let maxCount = 0;
    for (const a of groupA) {
      for (const b of groupB) {
        const ai = players.indexOf(a);
        const bi = players.indexOf(b);
        maxCount = Math.max(maxCount, opponentMatrix[ai][bi]);
      }
    }
    return maxCount;
  }

  /**
   * Score partner cost for a group being on the same side. Lower is better.
   */
  function partnerCost(group, players, partnerMatrix) {
    let maxCount = 0;
    for (let i = 0; i < group.length; i++) {
      for (let j = i + 1; j < group.length; j++) {
        const ai = players.indexOf(group[i]);
        const bi = players.indexOf(group[j]);
        maxCount = Math.max(maxCount, partnerMatrix[ai][bi]);
      }
    }
    return maxCount;
  }

  /**
   * For a given set of players at a table, find the best side split.
   * format: 2 (1v1), 3 (2v1), 4 (2v2)
   * Returns { sideA, sideB, oppCost, partCost }
   */
  function bestSplit(group, format, players, opponentMatrix, partnerMatrix) {
    const sideASize = format === 2 ? 1 : 2;
    const splits = combinations(group, sideASize);
    let best = null;

    for (const sideA of splits) {
      const sideB = group.filter(p => !sideA.includes(p));
      const oc = opponentCost(sideA, sideB, players, opponentMatrix);
      const pcA = partnerCost(sideA, players, partnerMatrix);
      const pcB = partnerCost(sideB, players, partnerMatrix);
      const pc = Math.max(pcA, pcB);

      const score = oc + pc;
      if (!best || score < best.score) {
        best = { sideA, sideB, oppCost: oc, partCost: pc, score };
      }
    }
    return best;
  }

  /**
   * Generate all ways to partition `pool` into groups of sizes given by `formats`.
   * Returns array of arrays-of-groups, e.g. [[[A,B],[C,D],[E,F]], ...]
   */
  function partitions(pool, formats, allPlayers) {
    if (formats.length === 0) return [[]];
    const [size, ...restFormats] = formats;
    const groups = combinations(pool, size);
    const results = [];
    for (const group of groups) {
      const remaining = pool.filter(p => !group.includes(p));
      for (const rest of partitions(remaining, restFormats, allPlayers)) {
        results.push([group, ...rest]);
      }
    }
    // Deduplicate partitions where formats have equal sizes
    if (formats.length > 1 && formats[0] === formats[1]) {
      const seen = new Set();
      const unique = [];
      for (const partition of results) {
        const key = partition.map(g => g.map(p => allPlayers.indexOf(p)).sort().join(',')).sort().join('|');
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(partition);
        }
      }
      return unique;
    }
    return results;
  }

  /**
   * Assign one round of play.
   * For small groups (≤10 players): enumerates all partitions and picks the best.
   * For larger groups: uses greedy assignment with multiple random orderings.
   */
  function assignRound(players, formats, opponentMatrix, partnerMatrix) {
    const sortedFormats = [...formats].sort((a, b) => b - a);

    if (players.length <= 8) {
      return assignRoundExhaustive(players, sortedFormats, opponentMatrix, partnerMatrix);
    }
    return assignRoundGreedy(players, sortedFormats, opponentMatrix, partnerMatrix);
  }

  function assignRoundExhaustive(players, sortedFormats, opponentMatrix, partnerMatrix) {
    const allPartitions = partitions([...players], sortedFormats, players);

    // Collect all tied-best partitions and pick randomly among them
    let bestRounds = [];
    let bestScore = Infinity;

    for (const partition of allPartitions) {
      let roundOppCost = 0;
      let roundPartCost = 0;
      const splits = [];

      for (let i = 0; i < partition.length; i++) {
        const group = partition[i];
        const format = sortedFormats[i];
        const split = bestSplit(group, format, players, opponentMatrix, partnerMatrix);
        splits.push(split);
        roundOppCost += split.oppCost;
        roundPartCost += split.partCost;
      }

      // Combined opponent + partner cost (equal weight)
      const score = roundOppCost + roundPartCost;
      const roundData = splits.map((split, i) => ({
        format: sortedFormats[i] === 4 ? 'doubles' : sortedFormats[i] === 3 ? '2v1' : 'singles',
        sideA: split.sideA,
        sideB: split.sideB
      }));
      if (score < bestScore) {
        bestScore = score;
        bestRounds = [roundData];
      } else if (score === bestScore) {
        bestRounds.push(roundData);
      }
    }

    // Pick randomly among tied-best to enable schedule variety across attempts
    return { tables: bestRounds[Math.floor(Math.random() * bestRounds.length)] };
  }

  function assignRoundGreedy(players, sortedFormats, opponentMatrix, partnerMatrix) {
    // Try multiple random orderings and pick the best overall round
    let bestRound = null;
    let bestScore = Infinity;
    const attempts = 30;

    for (let attempt = 0; attempt < attempts; attempt++) {
      const pool = [...players];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      const tables = [];
      const remaining = [...pool];
      let roundOppCost = 0;
      let roundPartCost = 0;

      for (const format of sortedFormats) {
        const candidates = combinations(remaining, format);
        let bestTable = null;
        let bestTableScore = Infinity;

        for (const group of candidates) {
          const split = bestSplit(group, format, players, opponentMatrix, partnerMatrix);
          const tableScore = split.oppCost + split.partCost;
          if (tableScore < bestTableScore) {
            bestTableScore = tableScore;
            bestTable = { ...split, format };
          }
        }

        const formatLabel = format === 4 ? 'doubles' : format === 3 ? '2v1' : 'singles';
        tables.push({ format: formatLabel, sideA: bestTable.sideA, sideB: bestTable.sideB });
        roundOppCost += bestTable.oppCost;
        roundPartCost += bestTable.partCost;

        for (const p of [...bestTable.sideA, ...bestTable.sideB]) {
          remaining.splice(remaining.indexOf(p), 1);
        }
      }

      const score = roundOppCost + roundPartCost;
      if (score < bestScore) {
        bestScore = score;
        bestRound = tables;
      }
    }

    return { tables: bestRound };
  }

  /**
   * Circle method: 1-factorization of K_n for partnership-first scheduling.
   * Handles all formats (all-doubles, mixed doubles+singles, all-singles).
   * Guarantees unique partnerships for doubles tables.
   */
  function circleSchedule(players, formats) {
    const n = players.length;
    // For odd n, add a virtual "bye" player to make it even
    const isOdd = n % 2 === 1;
    const nn = isOdd ? n + 1 : n;
    const BYE = nn - 1; // virtual player index (only used if odd)

    // Generate round-robin: nn-1 rounds of nn/2 pairs
    const indices = Array.from({length: nn}, (_, i) => i);
    const rest = indices.slice(1);
    for (let i = rest.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rest[i], rest[j]] = [rest[j], rest[i]];
    }
    const all = [0, ...rest];

    const rrRounds = [];
    for (let r = 0; r < nn - 1; r++) {
      const pairs = [[all[0], all[nn-1]]];
      for (let i = 1; i < nn/2; i++)
        pairs.push([all[i], all[nn-1-i]]);
      rrRounds.push(pairs);
      const last = all.pop();
      all.splice(1, 0, last);
    }

    // Count how many doubles tables we need
    const numDoubles = formats.filter(f => f === 4).length;
    const numSingles = formats.filter(f => f === 2).length;
    const num2v1 = formats.filter(f => f === 3).length;


    // Helper: enumerate pairings of items into pairs
    function pairUp(items) {
      if (items.length <= 2) return items.length === 2 ? [[[items[0], items[1]]]] : [[]];
      const [first, ...rest] = items;
      const result = [];
      for (let i = 0; i < rest.length; i++) {
        const remaining = rest.filter((_, j) => j !== i);
        for (const sub of pairUp(remaining))
          result.push([[first, rest[i]], ...sub]);
      }
      return result;
    }

    const opp = Array.from({length: n}, () => Array(n).fill(0));
    const schedule = [];

    // Determine stopping condition
    const maxRounds = 20;

    for (let ri = 0; ri < Math.min(rrRounds.length, maxRounds); ri++) {
      let pairs = rrRounds[ri];

      // Remove pairs involving the BYE player (for odd n)
      if (isOdd) {
        pairs = pairs.filter(([a, b]) => a !== BYE && b !== BYE);
        // One player gets a "bye" — they need to be placed somewhere
        // The bye player gets put into a 2v1 table or handled below
      }

      // Now we have pairs of players. Each pair will be either:
      // - A doubles partnership (grouped with another pair)
      // - A singles match (opponents)
      // - Part of a 2v1 (for odd player counts)

      if (numDoubles > 0 && numSingles === 0 && num2v1 === 0 && !isOdd) {
        // All-doubles: group all pairs into doubles tables
        const pairIndices = Array.from({length: pairs.length}, (_, i) => i);
        const allGroupings = pairUp(pairIndices);

        let bestTables = [];
        let bestScore = Infinity;

        for (const grouping of allGroupings) {
          let score = 0;
          const tables = [];
          for (const [ei, ej] of grouping) {
            const [a, b] = pairs[ei];
            const [c, d] = pairs[ej];
            score += opp[a][c] + opp[a][d] + opp[b][c] + opp[b][d];
            tables.push({ format: 4, sideA: [a, b], sideB: [c, d] });
          }
          if (score < bestScore) { bestScore = score; bestTables = [tables]; }
          else if (score === bestScore) bestTables.push(tables);
        }

        const chosen = bestTables[Math.floor(Math.random() * bestTables.length)];
        schedule.push(chosen);
        for (const t of chosen)
          for (const a of t.sideA) for (const b of t.sideB) {
            opp[a][b]++; opp[b][a]++;
          }
      } else {
        // Mixed format: pick which pairs become doubles partnerships,
        // which become singles opponents, and handle 2v1 for odd counts.
        // We need numDoubles*2 pairs for doubles, numSingles pairs for singles.
        // For odd n with 2v1: one player has a bye. They join a singles pair to make 2v1.

        const pairIndices = Array.from({length: pairs.length}, (_, i) => i);
        // Choose which pairs go to doubles tables
        const doublesPairSets = combinations(pairIndices, numDoubles * 2);

        let bestTables = [];
        let bestScore = Infinity;

        for (const dpSet of doublesPairSets) {
          const singlesPairIndices = pairIndices.filter(i => !dpSet.includes(i));

          // Group doubles pairs into doubles tables
          const doublesGroupings = pairUp(dpSet);

          for (const dGrouping of doublesGroupings) {
            let score = 0;
            const tables = [];

            for (const [ei, ej] of dGrouping) {
              const [a, b] = pairs[ei];
              const [c, d] = pairs[ej];
              score += opp[a][c] + opp[a][d] + opp[b][c] + opp[b][d];
              tables.push({ format: 4, sideA: [a, b], sideB: [c, d] });
            }

            // Singles pairs become opponents
            for (const si of singlesPairIndices) {
              const [a, b] = pairs[si];
              score += opp[a][b];
              tables.push({ format: 2, sideA: [a], sideB: [b] });
            }

            // Handle 2v1 for odd player counts
            if (isOdd && num2v1 > 0) {
              // The bye player (not in any pair) needs a table
              const byePlayer = Array.from({length: n}, (_, i) => i)
                .find(i => !pairs.some(([a,b]) => a === i || b === i));
              if (byePlayer !== undefined) {
                // Take the last singles table and convert to 2v1
                const lastSingles = tables.findIndex(t => t.format === 2);
                if (lastSingles >= 0) {
                  const t = tables[lastSingles];
                  score += opp[byePlayer][t.sideB[0]];
                  tables[lastSingles] = {
                    format: 3,
                    sideA: [t.sideA[0], byePlayer],
                    sideB: t.sideB
                  };
                }
              }
            }

            if (score < bestScore) { bestScore = score; bestTables = [tables]; }
            else if (score === bestScore) bestTables.push(tables);
          }
        }

        const chosen = bestTables[Math.floor(Math.random() * bestTables.length)];
        schedule.push(chosen);
        for (const t of chosen) {
          for (const a of t.sideA) for (const b of t.sideB) {
            opp[a][b]++; opp[b][a]++;
          }
        }
      }

      // No early stopping — generate all n-1 rounds for complete coverage
    }

    // Convert indices to player objects, shuffle table positions per round
    return schedule.map(round => ({
      tables: shuffleArray(round.map(t => ({
        format: t.format === 4 ? 'doubles' : t.format === 3 ? '2v1' : 'singles',
        sideA: (t.sideA || []).map(i => players[i]),
        sideB: (t.sideB || []).map(i => players[i])
      })))
    }));
  }

  /** Shuffle array in-place (Fisher-Yates). */
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /**
   * Generate a full schedule. Generates multiple candidate schedules
   * and picks the one with best variety (no repeated teams/partnerships).
   */
  function generateSchedule(players, tableCount) {
    const n = players.length;
    const formats = decideTableFormats(n, tableCount);
    const maxRounds = 20;

    function generateCandidate() {
      const opp = Array.from({ length: n }, () => Array(n).fill(0));
      const par = Array.from({ length: n }, () => Array(n).fill(0));
      const rounds = [];

      while (rounds.length < maxRounds) {
        const round = assignRound(players, formats, opp, par);
        rounds.push(round);

        for (const table of round.tables) {
          for (const a of table.sideA) for (const b of table.sideB) {
            opp[players.indexOf(a)][players.indexOf(b)]++;
            opp[players.indexOf(b)][players.indexOf(a)]++;
          }
          for (const side of [table.sideA, table.sideB]) {
            for (let i = 0; i < side.length; i++)
              for (let j = i + 1; j < side.length; j++) {
                par[players.indexOf(side[i])][players.indexOf(side[j])]++;
                par[players.indexOf(side[j])][players.indexOf(side[i])]++;
              }
          }
        }

        let allOppMet = true;
        for (let i = 0; i < n && allOppMet; i++)
          for (let j = i + 1; j < n && allOppMet; j++)
            if (opp[i][j] === 0) allOppMet = false;

        if (allOppMet) break;
      }
      return { rounds, opp, par };
    }

    function scoreSchedule(result) {
      let oppMax = 0, parMax = 0, oppSqSum = 0, parSqSum = 0;
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++) {
          oppMax = Math.max(oppMax, result.opp[i][j]);
          parMax = Math.max(parMax, result.par[i][j]);
          oppSqSum += result.opp[i][j] ** 2;
          parSqSum += result.par[i][j] ** 2;
        }
      // Heavily penalise max partner/opponent repeats, then evenness
      return parMax * 10000 + oppMax * 1000 + parSqSum * 10 + oppSqSum;
    }

    function scoreRounds(rounds) {
      const o = Array.from({ length: n }, () => Array(n).fill(0));
      const p = Array.from({ length: n }, () => Array(n).fill(0));
      for (const round of rounds)
        for (const table of round.tables) {
          for (const x of table.sideA) for (const y of table.sideB) {
            o[players.indexOf(x)][players.indexOf(y)]++;
            o[players.indexOf(y)][players.indexOf(x)]++;
          }
          for (const side of [table.sideA, table.sideB])
            for (let i = 0; i < side.length; i++)
              for (let j = i + 1; j < side.length; j++) {
                p[players.indexOf(side[i])][players.indexOf(side[j])]++;
                p[players.indexOf(side[j])][players.indexOf(side[i])]++;
              }
        }
      return scoreSchedule({ opp: o, par: p });
    }

    // Try circle method for all-doubles/all-singles (fast path)
    const allDoubles = formats.every(f => f === 4) && n % 2 === 0;
    const allSingles = formats.every(f => f === 2);

    if ((allDoubles && formats.length >= 3) || allSingles) {
      let best = null;
      let bestScore = Infinity;
      for (let a = 0; a < 20; a++) {
        const rounds = circleSchedule(players, formats);
        const score = scoreRounds(rounds);
        if (score < bestScore) { bestScore = score; best = rounds; }
        if (bestScore < 2000) break;
      }
      return best;
    }

    // Greedy multi-candidate approach (mixed formats or circle fallback)
    const maxAttempts = 40;
    const timeLimit = 15000;
    const startTime = Date.now();
    let best = null;
    let bestScore = Infinity;

    for (let a = 0; a < maxAttempts; a++) {
      const candidate = generateCandidate();
      const score = scoreSchedule(candidate);
      if (score < bestScore) {
        bestScore = score;
        best = candidate.rounds;
      }
      if (bestScore < 2000) break;
      if (Date.now() - startTime > timeLimit) break;
    }

    // Shuffle table positions per round so players don't stay at the same table
    if (best) best.forEach(round => shuffleArray(round.tables));
    return best;
  }

  // Expose for testing
  if (typeof globalThis !== 'undefined') {
    globalThis.Scheduler = { decideTableFormats, assignRound, generateSchedule, shuffleArray };
  }

  // ===== App State =====

  let nextColorIndex = 0;

  const state = {
    players: [],
    tableCount: 1,
    rounds: [],
    currentView: 'setup',
    currentRound: 0
  };

  // ===== Render: Setup View =====

  function renderSetup() {
    const app = document.getElementById('app');
    const maxTables = Math.max(1, Math.floor(state.players.length / 2));
    const minTables = Math.max(1, Math.ceil(state.players.length / 4));
    if (state.tableCount > maxTables) state.tableCount = maxTables;
    if (state.tableCount < minTables) state.tableCount = minTables;

    app.innerHTML = `
      <div class="max-w-lg mx-auto px-4 py-8">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-white">Shuffle Pong</h1>
          <p class="text-gray-500 text-sm">Table Tennis Group Scheduler</p>
        </div>

        <div class="mb-6">
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Players</label>
          <div id="player-pills" class="flex flex-wrap gap-2 mb-3">
            ${state.players.map((p, i) => `
              <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}">
                ${escapeHtml(p.name)}
                <button onclick="removePlayer(${i})" title="Remove">&times;</button>
              </span>
            `).join('')}
          </div>
          <div class="flex gap-2">
            <input id="player-input" type="text" placeholder="Add player name..."
              class="flex-1 px-3 py-2 rounded-lg border border-gray-700 text-white text-sm focus:outline-none focus:border-blue-500"
              style="background: #16213e;"
              onkeydown="if(event.key==='Enter')addPlayer()">
            <button onclick="addPlayer()"
              class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-500">Add</button>
          </div>
          <p class="text-gray-600 text-xs mt-1">Press Enter to add, click &times; to remove</p>
        </div>

        <div class="mb-6">
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Tables Available</label>
          <div class="flex items-center gap-4">
            <button onclick="changeTableCount(-1)" ${state.tableCount <= minTables ? 'disabled' : ''}
              class="w-9 h-9 rounded-lg border border-gray-700 text-white text-lg ${state.tableCount <= minTables ? 'opacity-30 cursor-not-allowed' : 'hover:bg-gray-700 cursor-pointer'}"
              style="background: #16213e;">−</button>
            <span class="text-2xl font-bold text-white min-w-[40px] text-center">${state.tableCount} / ${maxTables}</span>
            <button onclick="changeTableCount(1)" ${state.tableCount >= maxTables ? 'disabled' : ''}
              class="w-9 h-9 rounded-lg border border-gray-700 text-white text-lg ${state.tableCount >= maxTables ? 'opacity-30 cursor-not-allowed' : 'hover:bg-gray-700 cursor-pointer'}"
              style="background: #16213e;">+</button>
          </div>
        </div>

        <button onclick="generate()" ${state.players.length < 2 ? 'disabled' : ''}
          class="w-full py-3 rounded-xl text-white font-bold text-base ${state.players.length < 2 ? 'opacity-40 cursor-not-allowed' : 'hover:opacity-90 cursor-pointer'}"
          style="background: linear-gradient(135deg, #3498db, #2ecc71);">
          Generate Schedule →
        </button>

        <p class="text-center text-gray-600 text-xs mt-2">${getSummaryText()}</p>
      </div>
    `;

    if (state._focusInput) {
      document.getElementById('player-input')?.focus();
      state._focusInput = false;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function getSummaryText() {
    const n = state.players.length;
    if (n < 2) return 'Add at least 2 players to generate';
    const formats = decideTableFormats(n, state.tableCount);
    const types = formats.map(f => f === 4 ? 'doubles' : f === 3 ? '2v1' : 'singles');
    const unique = [...new Set(types)].join(' + ');
    return `${n} players × ${formats.length} table${formats.length > 1 ? 's' : ''} → ${unique}`;
  }

  // ===== Render: Schedule View =====

  function renderSchedule() {
    const app = document.getElementById('app');
    const roundCount = state.rounds.length;

    app.innerHTML = `
      <div class="max-w-lg mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-xl font-bold text-white">Shuffle Pong</h1>
          <button onclick="editPlayers()"
            class="px-3 py-1.5 rounded-lg border border-gray-700 text-blue-400 text-sm hover:bg-gray-800"
            style="background: #16213e;">← Edit Players</button>
        </div>

        <p class="text-gray-500 text-sm mb-4">
          ${state.players.length} players · ${state.rounds[0]?.tables.length || 0} table${(state.rounds[0]?.tables.length || 0) > 1 ? 's' : ''} · Round ${state.currentRound + 1} of ${roundCount}
        </p>

        <button onclick="nextRound()"
          class="w-full py-2.5 mb-4 rounded-xl text-white font-bold text-sm hover:opacity-90 cursor-pointer"
          style="background: linear-gradient(135deg, #3498db, #2ecc71);">
          ${state.currentRound >= roundCount - 1 ? 'Restart from Round 1 ↺' : 'Next Round →'}
        </button>

        ${state.rounds.map((round, ri) => `
          <div class="card" style="border-left: 3px solid ${ri === state.currentRound ? '#3498db' : '#333'};">
            <div class="text-sm font-bold mb-3" style="color: ${ri === state.currentRound ? '#3498db' : '#aaa'};">
              Round ${ri + 1}
            </div>
            ${round.tables.map((table, ti) => `
              <div class="${ti < round.tables.length - 1 ? 'mb-3' : ''}">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1.5">
                  Table ${ti + 1} · ${table.format === 'singles' ? 'Singles' : table.format === 'doubles' ? 'Doubles' : '2v1'}
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                  ${table.sideA.map(p => `
                    <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}; font-size: 13px; padding: 2px 10px;">
                      ${escapeHtml(p.name)}
                    </span>
                  `).join('')}
                  <span class="text-gray-400 font-bold text-sm">vs</span>
                  ${table.sideB.map(p => `
                    <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}; font-size: 13px; padding: 2px 10px;">
                      ${escapeHtml(p.name)}
                    </span>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `;
  }

  // ===== Event Handlers =====

  function addPlayer() {
    const input = document.getElementById('player-input');
    const name = input.value.trim();
    if (!name) return;
    if (state.players.length >= 14) return;
    if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) return;
    state.players.push({ name, colorIndex: nextColorIndex++ });
    state._focusInput = true;
    renderSetup();
  }

  function removePlayer(index) {
    state.players.splice(index, 1);
    state._focusInput = true;
    renderSetup();
  }

  function changeTableCount(delta) {
    const maxTables = Math.max(1, Math.floor(state.players.length / 2));
    const minTables = Math.max(1, Math.ceil(state.players.length / 4));
    state.tableCount = Math.max(minTables, Math.min(maxTables, state.tableCount + delta));
    renderSetup();
  }

  function generate() {
    if (state.players.length < 2) return;

    // Show loading state
    const btn = document.querySelector('button[onclick="generate()"]');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Generating...';
      btn.classList.add('opacity-60');
    }

    // Defer to next frame so UI updates before heavy computation
    setTimeout(() => {
      state.rounds = generateSchedule(state.players, state.tableCount);
      state.currentView = 'schedule';
      state.currentRound = 0;
      renderSchedule();
    }, 20);
  }

  function nextRound() {
    state.currentRound = (state.currentRound + 1) % state.rounds.length;
    renderSchedule();
  }

  function editPlayers() {
    state.currentView = 'setup';
    state.rounds = [];
    state.currentRound = 0;
    renderSetup();
  }

  // ===== Init =====

  if (typeof document !== 'undefined') {
    state._focusInput = true;
    renderSetup();
  }

  </script>
</body>
</html>
