  <style>

<body class="min-h-screen" style="background: #1a1a2e;">
  <div id="app"></div>
  <script>
  // ===== Scheduler Module =====

  const PALETTE = [
    '#c0392b', '#2874a6', '#1e8449', '#8e44ad', '#c44900',
    '#0b7285', '#c7254e', '#7d6608', '#2e4da7', '#a83279',
    '#117a65', '#5b3daf', '#4a7c10', '#982d6b'
  ];

  /**
   * Decide table formats for N players across at most T tables.
   * Returns an array of player counts per table (2, 3, or 4).
   * Prefers doubles (4) and singles (2). Uses 2v1 (3) only for odd remainders.
   */
  function decideTableFormats(playerCount, tableCount, allow2v1 = true) {
    const maxTables = Math.min(tableCount, Math.floor(playerCount / 2));

    let best = null;

    for (let numTables = 1; numTables <= maxTables; numTables++) {
      for (let d = numTables; d >= 0; d--) {
        const remaining = numTables - d;
        const doublesPlayers = d * 4;

        if (remaining === 0) {
          // All doubles tables
          const seated = doublesPlayers;
          if (seated > playerCount) continue;
          const formats = Array(d).fill(4);
          if (!best || seated > best.seated || (seated === best.seated && (formats.length > best.formats.length || (formats.length === best.formats.length && 0 < best.threes)))) {
            best = { formats, threes: 0, seated };
          }
          continue;
        }

        // Remaining tables are singles (2) or 2v1 (3)
        // Try all valid splits of remaining tables into 3s and 2s
        const maxThrees = allow2v1 ? remaining : 0;
        for (let threes = 0; threes <= maxThrees; threes++) {
          const twos = remaining - threes;
          const seated = doublesPlayers + threes * 3 + twos * 2;
          if (seated > playerCount) continue;

          const formats = Array(d).fill(4);
          for (let i = 0; i < threes; i++) formats.push(3);
          for (let i = 0; i < twos; i++) formats.push(2);

          if (!best
            || seated > best.seated
            || (seated === best.seated && threes < best.threes)
            || (seated === best.seated && threes === best.threes && formats.length > best.formats.length)) {
            best = { formats, threes, seated };
          }
        }
      }
    }

    return best ? best.formats : [];
  }

  /**
   * Get all combinations of `k` items from `arr`.
   */
  function combinations(arr, k) {
    if (k === 0) return [[]];
    if (arr.length < k) return [];
    const [first, ...rest] = arr;
    const withFirst = combinations(rest, k - 1).map(c => [first, ...c]);
    const withoutFirst = combinations(rest, k);
    return [...withFirst, ...withoutFirst];
  }

  /**
   * Score how "costly" it is for groupA to face groupB, based on opponent history.
   * Lower is better. Returns the max opponent count among all cross-pairs.
   */
  function opponentCost(groupA, groupB, players, opponentMatrix) {
    let maxCount = 0;
    for (const a of groupA) {
      for (const b of groupB) {
        const ai = players.indexOf(a);
        const bi = players.indexOf(b);
        maxCount = Math.max(maxCount, opponentMatrix[ai][bi]);
      }
    }
    return maxCount;
  }

  /**
   * Score partner cost for a group being on the same side. Lower is better.
   */
  function partnerCost(group, players, partnerMatrix) {
    let maxCount = 0;
    for (let i = 0; i < group.length; i++) {
      for (let j = i + 1; j < group.length; j++) {
        const ai = players.indexOf(group[i]);
        const bi = players.indexOf(group[j]);
        maxCount = Math.max(maxCount, partnerMatrix[ai][bi]);
      }
    }
    return maxCount;
  }

  /**
   * For a given set of players at a table, find the best side split.
   * format: 2 (1v1), 3 (2v1), 4 (2v2)
   * Returns { sideA, sideB, oppCost, partCost }
   */
  function bestSplit(group, format, players, opponentMatrix, partnerMatrix) {
    const sideASize = format === 2 ? 1 : 2;
    const splits = combinations(group, sideASize);
    let best = null;

    for (const sideA of splits) {
      const sideB = group.filter(p => !sideA.includes(p));
      const oc = opponentCost(sideA, sideB, players, opponentMatrix);
      const pcA = partnerCost(sideA, players, partnerMatrix);
      const pcB = partnerCost(sideB, players, partnerMatrix);
      const pc = Math.max(pcA, pcB);

      const score = oc + pc;
      if (!best || score < best.score) {
        best = { sideA, sideB, oppCost: oc, partCost: pc, score };
      }
    }
    return best;
  }

  /**
   * Generate all ways to partition `pool` into groups of sizes given by `formats`.
   * Returns array of arrays-of-groups, e.g. [[[A,B],[C,D],[E,F]], ...]
   */
  function partitions(pool, formats, allPlayers) {
    if (formats.length === 0) return [[]];
    const [size, ...restFormats] = formats;
    const groups = combinations(pool, size);
    const results = [];
    for (const group of groups) {
      const remaining = pool.filter(p => !group.includes(p));
      for (const rest of partitions(remaining, restFormats, allPlayers)) {
        results.push([group, ...rest]);
      }
    }
    // Deduplicate partitions where formats have equal sizes
    if (formats.length > 1 && formats[0] === formats[1]) {
      const seen = new Set();
      const unique = [];
      for (const partition of results) {
        const key = partition.map(g => g.map(p => allPlayers.indexOf(p)).sort().join(',')).sort().join('|');
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(partition);
        }
      }
      return unique;
    }
    return results;
  }

  /**
   * Assign one round of play.
   * For small groups (≤10 players): enumerates all partitions and picks the best.
   * For larger groups: uses greedy assignment with multiple random orderings.
   */
  function assignRound(players, formats, opponentMatrix, partnerMatrix, soloCount) {
    const sortedFormats = [...formats].sort((a, b) => b - a);
    const sc = soloCount || Array(players.length).fill(0);

    if (players.length <= 8) {
      return assignRoundExhaustive(players, sortedFormats, opponentMatrix, partnerMatrix, sc);
    }
    return assignRoundGreedy(players, sortedFormats, opponentMatrix, partnerMatrix, sc);
  }

  function assignRoundExhaustive(players, sortedFormats, opponentMatrix, partnerMatrix, soloCount) {
    const allPartitions = partitions([...players], sortedFormats, players);

    // Collect all tied-best partitions and pick randomly among them
    let bestRounds = [];
    let bestScore = Infinity;

    for (const partition of allPartitions) {
      let roundOppCost = 0;
      let roundPartCost = 0;
      let roundSoloCost = 0;
      const splits = [];

      for (let i = 0; i < partition.length; i++) {
        const group = partition[i];
        const format = sortedFormats[i];
        const split = bestSplit(group, format, players, opponentMatrix, partnerMatrix);
        splits.push(split);
        roundOppCost += split.oppCost;
        roundPartCost += split.partCost;
        for (const side of [split.sideA, split.sideB])
          if (side.length === 1) roundSoloCost += soloCount[players.indexOf(side[0])];
      }

      // Combined opponent + partner + solo cost (equal weight)
      const score = roundOppCost + roundPartCost + roundSoloCost;
      const roundData = splits.map((split, i) => ({
        format: sortedFormats[i] === 4 ? 'doubles' : sortedFormats[i] === 3 ? '2v1' : 'singles',
        sideA: split.sideA,
        sideB: split.sideB
      }));
      if (score < bestScore) {
        bestScore = score;
        bestRounds = [roundData];
      } else if (score === bestScore) {
        bestRounds.push(roundData);
      }
    }

    // Pick randomly among tied-best to enable schedule variety across attempts
    return { tables: bestRounds[Math.floor(Math.random() * bestRounds.length)] };
  }

  function assignRoundGreedy(players, sortedFormats, opponentMatrix, partnerMatrix, soloCount) {
    // Try multiple random orderings and pick the best overall round
    let bestRound = null;
    let bestScore = Infinity;
    const attempts = 30;

    for (let attempt = 0; attempt < attempts; attempt++) {
      const pool = [...players];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      const tables = [];
      const remaining = [...pool];
      let roundOppCost = 0;
      let roundPartCost = 0;
      let roundSoloCost = 0;

      for (const format of sortedFormats) {
        const candidates = combinations(remaining, format);
        let bestTable = null;
        let bestTableScore = Infinity;

        for (const group of candidates) {
          const split = bestSplit(group, format, players, opponentMatrix, partnerMatrix);
          let sc = 0;
          for (const side of [split.sideA, split.sideB])
            if (side.length === 1) sc += soloCount[players.indexOf(side[0])];
          const tableScore = split.oppCost + split.partCost + sc;
          if (tableScore < bestTableScore) {
            bestTableScore = tableScore;
            bestTable = { ...split, format, soloCost: sc };
          }
        }

        const formatLabel = format === 4 ? 'doubles' : format === 3 ? '2v1' : 'singles';
        tables.push({ format: formatLabel, sideA: bestTable.sideA, sideB: bestTable.sideB });
        roundOppCost += bestTable.oppCost;
        roundPartCost += bestTable.partCost;
        roundSoloCost += bestTable.soloCost;

        for (const p of [...bestTable.sideA, ...bestTable.sideB]) {
          remaining.splice(remaining.indexOf(p), 1);
        }
      }

      const score = roundOppCost + roundPartCost + roundSoloCost;
      if (score < bestScore) {
        bestScore = score;
        bestRound = tables;
      }
    }

    return { tables: bestRound };
  }

  /**
   * Circle method: 1-factorization of K_n for partnership-first scheduling.
   * Handles all formats (all-doubles, mixed doubles+singles, all-singles).
   * Guarantees unique partnerships for doubles tables.
   */
  function circleSchedule(players, formats) {
    const n = players.length;
    // For odd n, add a virtual "bye" player to make it even
    const isOdd = n % 2 === 1;
    const nn = isOdd ? n + 1 : n;
    const BYE = nn - 1; // virtual player index (only used if odd)

    // Generate round-robin: nn-1 rounds of nn/2 pairs
    const indices = Array.from({length: nn}, (_, i) => i);
    const rest = indices.slice(1);
    for (let i = rest.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rest[i], rest[j]] = [rest[j], rest[i]];
    }
    const all = [0, ...rest];

    const rrRounds = [];
    for (let r = 0; r < nn - 1; r++) {
      const pairs = [[all[0], all[nn-1]]];
      for (let i = 1; i < nn/2; i++)
        pairs.push([all[i], all[nn-1-i]]);
      rrRounds.push(pairs);
      const last = all.pop();
      all.splice(1, 0, last);
    }

    // Count how many doubles tables we need
    const numDoubles = formats.filter(f => f === 4).length;
    const numSingles = formats.filter(f => f === 2).length;
    const num2v1 = formats.filter(f => f === 3).length;


    // Helper: enumerate pairings of items into pairs
    function pairUp(items) {
      if (items.length <= 2) return items.length === 2 ? [[[items[0], items[1]]]] : [[]];
      const [first, ...rest] = items;
      const result = [];
      for (let i = 0; i < rest.length; i++) {
        const remaining = rest.filter((_, j) => j !== i);
        for (const sub of pairUp(remaining))
          result.push([[first, rest[i]], ...sub]);
      }
      return result;
    }

    const opp = Array.from({length: n}, () => Array(n).fill(0));
    const schedule = [];

    // Determine stopping condition
    const maxRounds = 40;

    for (let ri = 0; ri < Math.min(rrRounds.length, maxRounds); ri++) {
      let pairs = rrRounds[ri];

      // Remove pairs involving the BYE player (for odd n)
      if (isOdd) {
        pairs = pairs.filter(([a, b]) => a !== BYE && b !== BYE);
        // One player gets a "bye" — they need to be placed somewhere
        // The bye player gets put into a 2v1 table or handled below
      }

      // Now we have pairs of players. Each pair will be either:
      // - A doubles partnership (grouped with another pair)
      // - A singles match (opponents)
      // - Part of a 2v1 (for odd player counts)

      if (numDoubles > 0 && numSingles === 0 && num2v1 === 0 && !isOdd) {
        // All-doubles: group all pairs into doubles tables
        const pairIndices = Array.from({length: pairs.length}, (_, i) => i);
        const allGroupings = pairUp(pairIndices);

        let bestTables = [];
        let bestScore = Infinity;

        for (const grouping of allGroupings) {
          let score = 0;
          const tables = [];
          for (const [ei, ej] of grouping) {
            const [a, b] = pairs[ei];
            const [c, d] = pairs[ej];
            score += opp[a][c] + opp[a][d] + opp[b][c] + opp[b][d];
            tables.push({ format: 4, sideA: [a, b], sideB: [c, d] });
          }
          if (score < bestScore) { bestScore = score; bestTables = [tables]; }
          else if (score === bestScore) bestTables.push(tables);
        }

        const chosen = bestTables[Math.floor(Math.random() * bestTables.length)];
        schedule.push(chosen);
        for (const t of chosen)
          for (const a of t.sideA) for (const b of t.sideB) {
            opp[a][b]++; opp[b][a]++;
          }
      } else {
        // Mixed format: pick which pairs become doubles partnerships,
        // which become singles opponents, and handle 2v1 for odd counts.
        // We need numDoubles*2 pairs for doubles, numSingles pairs for singles.
        // For odd n with 2v1: one player has a bye. They join a singles pair to make 2v1.

        const pairIndices = Array.from({length: pairs.length}, (_, i) => i);
        // Choose which pairs go to doubles tables
        const doublesPairSets = combinations(pairIndices, numDoubles * 2);

        let bestTables = [];
        let bestScore = Infinity;

        for (const dpSet of doublesPairSets) {
          const singlesPairIndices = pairIndices.filter(i => !dpSet.includes(i));

          // Group doubles pairs into doubles tables
          const doublesGroupings = pairUp(dpSet);

          for (const dGrouping of doublesGroupings) {
            let score = 0;
            const tables = [];

            for (const [ei, ej] of dGrouping) {
              const [a, b] = pairs[ei];
              const [c, d] = pairs[ej];
              score += opp[a][c] + opp[a][d] + opp[b][c] + opp[b][d];
              tables.push({ format: 4, sideA: [a, b], sideB: [c, d] });
            }

            // Singles pairs become opponents
            for (const si of singlesPairIndices) {
              const [a, b] = pairs[si];
              score += opp[a][b];
              tables.push({ format: 2, sideA: [a], sideB: [b] });
            }

            // Handle 2v1 for odd player counts
            if (isOdd && num2v1 > 0) {
              // The bye player (not in any pair) needs a table
              const byePlayer = Array.from({length: n}, (_, i) => i)
                .find(i => !pairs.some(([a,b]) => a === i || b === i));
              if (byePlayer !== undefined) {
                // Take the last singles table and convert to 2v1
                const lastSingles = tables.findIndex(t => t.format === 2);
                if (lastSingles >= 0) {
                  const t = tables[lastSingles];
                  score += opp[byePlayer][t.sideB[0]];
                  tables[lastSingles] = {
                    format: 3,
                    sideA: [t.sideA[0], byePlayer],
                    sideB: t.sideB
                  };
                }
              }
            }

            if (score < bestScore) { bestScore = score; bestTables = [tables]; }
            else if (score === bestScore) bestTables.push(tables);
          }
        }

        const chosen = bestTables[Math.floor(Math.random() * bestTables.length)];
        schedule.push(chosen);
        for (const t of chosen) {
          for (const a of t.sideA) for (const b of t.sideB) {
            opp[a][b]++; opp[b][a]++;
          }
        }
      }

      // No early stopping — generate all n-1 rounds for complete coverage
    }

    // Convert indices to player objects, shuffle table positions per round
    return schedule.map(round => ({
      tables: shuffleArray(round.map(t => ({
        format: t.format === 4 ? 'doubles' : t.format === 3 ? '2v1' : 'singles',
        sideA: (t.sideA || []).map(i => players[i]),
        sideB: (t.sideB || []).map(i => players[i])
      })))
    }));
  }

  /** Shuffle array in-place (Fisher-Yates). */
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /**
   * Generate a full schedule for the given players and formats (all players active, no sit-outs).
   * Generates multiple candidate schedules and picks the one with best variety.
   */
  function generateScheduleFullField(players, formats) {
    const n = players.length;
    const maxRounds = 40;

    function generateCandidate() {
      const opp = Array.from({ length: n }, () => Array(n).fill(0));
      const par = Array.from({ length: n }, () => Array(n).fill(0));
      const solo = Array(n).fill(0);
      const rounds = [];

      while (rounds.length < maxRounds) {
        const round = assignRound(players, formats, opp, par, solo);
        rounds.push(round);

        for (const table of round.tables) {
          for (const a of table.sideA) for (const b of table.sideB) {
            opp[players.indexOf(a)][players.indexOf(b)]++;
            opp[players.indexOf(b)][players.indexOf(a)]++;
          }
          for (const side of [table.sideA, table.sideB]) {
            for (let i = 0; i < side.length; i++)
              for (let j = i + 1; j < side.length; j++) {
                par[players.indexOf(side[i])][players.indexOf(side[j])]++;
                par[players.indexOf(side[j])][players.indexOf(side[i])]++;
              }
            if (side.length === 1) solo[players.indexOf(side[0])]++;
          }
        }

        let allOppMet = true;
        for (let i = 0; i < n && allOppMet; i++)
          for (let j = i + 1; j < n && allOppMet; j++)
            if (opp[i][j] === 0) allOppMet = false;

        let allParMet = true;
        const hasPartnerFormats = formats.some(f => f >= 3);
        if (hasPartnerFormats) {
          for (let i = 0; i < n && allParMet; i++)
            for (let j = i + 1; j < n && allParMet; j++)
              if (par[i][j] === 0) allParMet = false;
        }

        if (allOppMet && allParMet) break;
      }
      return { rounds, opp, par };
    }

    function scoreSchedule(result) {
      let oppMax = 0, parMax = 0, oppSqSum = 0, parSqSum = 0;
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++) {
          oppMax = Math.max(oppMax, result.opp[i][j]);
          parMax = Math.max(parMax, result.par[i][j]);
          oppSqSum += result.opp[i][j] ** 2;
          parSqSum += result.par[i][j] ** 2;
        }
      // Heavily penalise max partner/opponent repeats, then evenness
      return parMax * 10000 + oppMax * 1000 + parSqSum * 10 + oppSqSum;
    }

    function scoreRounds(rounds) {
      const o = Array.from({ length: n }, () => Array(n).fill(0));
      const p = Array.from({ length: n }, () => Array(n).fill(0));
      for (const round of rounds)
        for (const table of round.tables) {
          for (const x of table.sideA) for (const y of table.sideB) {
            o[players.indexOf(x)][players.indexOf(y)]++;
            o[players.indexOf(y)][players.indexOf(x)]++;
          }
          for (const side of [table.sideA, table.sideB])
            for (let i = 0; i < side.length; i++)
              for (let j = i + 1; j < side.length; j++) {
                p[players.indexOf(side[i])][players.indexOf(side[j])]++;
                p[players.indexOf(side[j])][players.indexOf(side[i])]++;
              }
        }
      return scoreSchedule({ opp: o, par: p });
    }

    // Try circle method for all-doubles/all-singles (fast path)
    const allDoubles = formats.every(f => f === 4) && n % 2 === 0;
    const allSingles = formats.every(f => f === 2);

    if ((allDoubles && formats.length >= 3) || allSingles) {
      let best = null;
      let bestScore = Infinity;
      for (let a = 0; a < 20; a++) {
        const rounds = circleSchedule(players, formats);
        const score = scoreRounds(rounds);
        if (score < bestScore) { bestScore = score; best = rounds; }
        if (bestScore < 2000) break;
      }
      if (best) best.forEach(round => { round.sittingOut = round.sittingOut || []; });
      return best;
    }

    // Greedy multi-candidate approach (mixed formats or circle fallback)
    const maxAttempts = 40;
    const timeLimit = 15000;
    const startTime = Date.now();
    let best = null;
    let bestScore = Infinity;

    for (let a = 0; a < maxAttempts; a++) {
      const candidate = generateCandidate();
      const score = scoreSchedule(candidate);
      if (score < bestScore) {
        bestScore = score;
        best = candidate.rounds;
      }
      if (bestScore < 2000) break;
      if (Date.now() - startTime > timeLimit) break;
    }

    if (best) best.forEach(round => {
      shuffleArray(round.tables);
      round.sittingOut = round.sittingOut || [];
    });
    return best;
  }

  /**
   * Generate a full schedule. If there are more players than table capacity,
   * uses sit-out rotation to ensure fair bench time.
   */
  function generateSchedule(players, tableCount, allow2v1 = true) {
    const n = players.length;
    const formats = decideTableFormats(n, tableCount, allow2v1);
    const capacity = formats.reduce((a, b) => a + b, 0);
    const sitOutCount = n - capacity;
    const maxRounds = 40;

    if (sitOutCount <= 0) {
      return generateScheduleFullField(players, formats);
    }

    // Sit-out mode: build rounds one at a time, rotating who sits out
    const opp = Array.from({ length: n }, () => Array(n).fill(0));
    const par = Array.from({ length: n }, () => Array(n).fill(0));
    const solo = Array(n).fill(0);
    const sitCounts = Array(n).fill(0);
    const lastSatOut = Array(n).fill(-1);
    const rounds = [];

    while (rounds.length < maxRounds) {
      // Pick sit-out players: fewest sit-outs first, then longest since last sit-out
      const indices = Array.from({ length: n }, (_, i) => i);
      indices.sort((a, b) => sitCounts[a] - sitCounts[b] || lastSatOut[a] - lastSatOut[b]);
      const benchIndices = indices.slice(0, sitOutCount);
      const activeIndices = indices.slice(sitOutCount);

      const activePlayers = activeIndices.map(i => players[i]);
      const benchPlayers = benchIndices.map(i => players[i]);
      for (const bi of benchIndices) {
        sitCounts[bi]++;
        lastSatOut[bi] = rounds.length;
      }

      // Build sub-matrices for active players (indexed into full matrix)
      const subOpp = activeIndices.map(i => activeIndices.map(j => opp[i][j]));
      const subPar = activeIndices.map(i => activeIndices.map(j => par[i][j]));
      const subSolo = activeIndices.map(i => solo[i]);

      const round = assignRound(activePlayers, formats, subOpp, subPar, subSolo);
      round.sittingOut = benchPlayers;
      rounds.push(round);

      // Update full matrices
      for (const table of round.tables) {
        for (const a of table.sideA) for (const b of table.sideB) {
          const ai = players.indexOf(a);
          const bi = players.indexOf(b);
          opp[ai][bi]++; opp[bi][ai]++;
        }
        for (const side of [table.sideA, table.sideB]) {
          for (let i = 0; i < side.length; i++)
            for (let j = i + 1; j < side.length; j++) {
              const ai = players.indexOf(side[i]);
              const bi = players.indexOf(side[j]);
              par[ai][bi]++; par[bi][ai]++;
            }
          if (side.length === 1) solo[players.indexOf(side[0])]++;
        }
      }

      // Check if all pairs have met as opponents and partners
      let allOppMet = true;
      for (let i = 0; i < n && allOppMet; i++)
        for (let j = i + 1; j < n && allOppMet; j++)
          if (opp[i][j] === 0) allOppMet = false;

      let allParMet = true;
      const hasPartnerFormats = formats.some(f => f >= 3);
      if (hasPartnerFormats) {
        for (let i = 0; i < n && allParMet; i++)
          for (let j = i + 1; j < n && allParMet; j++)
            if (par[i][j] === 0) allParMet = false;
      }
      if (allOppMet && allParMet) break;
    }

    rounds.forEach(round => shuffleArray(round.tables));
    return rounds;
  }

  /**
   * Analyse a generated schedule and return quality metrics for debug display.
   */
  function analyseSchedule(players, rounds) {
    const n = players.length;
    const opp = Array.from({ length: n }, () => Array(n).fill(0));
    const par = Array.from({ length: n }, () => Array(n).fill(0));
    const soloPerPlayer = Array(n).fill(0);
    const gamesPerPlayer = Array(n).fill(0);
    const sitOutPerPlayer = Array(n).fill(0);

    for (const round of rounds) {
      const played = new Set();
      for (const table of round.tables) {
        for (const a of table.sideA) for (const b of table.sideB) {
          const ai = players.indexOf(a), bi = players.indexOf(b);
          opp[ai][bi]++; opp[bi][ai]++;
        }
        for (const side of [table.sideA, table.sideB]) {
          for (let i = 0; i < side.length; i++) {
            const pi = players.indexOf(side[i]);
            played.add(pi);
            gamesPerPlayer[pi]++;
            if (side.length === 1) soloPerPlayer[pi]++;
            for (let j = i + 1; j < side.length; j++) {
              const qi = players.indexOf(side[j]);
              par[pi][qi]++; par[qi][pi]++;
            }
          }
        }
      }
      for (let i = 0; i < n; i++) {
        if (!played.has(i)) sitOutPerPlayer[i]++;
      }
    }

    // Opponent metrics
    let oppPairs = 0, oppCovered = 0, oppMaxVal = 0;
    const oppRepeats = [];
    for (let i = 0; i < n; i++)
      for (let j = i + 1; j < n; j++) {
        oppPairs++;
        if (opp[i][j] > 0) oppCovered++;
        oppMaxVal = Math.max(oppMaxVal, opp[i][j]);
        if (opp[i][j] >= 3) oppRepeats.push({ a: players[i].name, b: players[j].name, count: opp[i][j] });
      }

    // Partner metrics
    let parPairs = 0, parCovered = 0, parMaxVal = 0;
    const parRepeats = [];
    const hasPartnerFormats = rounds.some(r => r.tables.some(t =>
      t.sideA.length + t.sideB.length >= 3));
    if (hasPartnerFormats) {
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++) {
          parPairs++;
          if (par[i][j] > 0) parCovered++;
          parMaxVal = Math.max(parMaxVal, par[i][j]);
          if (par[i][j] >= 2) parRepeats.push({ a: players[i].name, b: players[j].name, count: par[i][j] });
        }
    }

    // Solo streaks
    const soloStreaks = Array(n).fill(0);
    const currentStreak = Array(n).fill(0);
    for (const round of rounds) {
      const soloThisRound = new Set();
      for (const table of round.tables)
        for (const side of [table.sideA, table.sideB])
          if (side.length === 1) soloThisRound.add(players.indexOf(side[0]));
      for (let i = 0; i < n; i++) {
        const inRound = round.tables.some(t =>
          [...t.sideA, ...t.sideB].includes(players[i]));
        if (!inRound) continue;
        if (soloThisRound.has(i)) {
          currentStreak[i]++;
          soloStreaks[i] = Math.max(soloStreaks[i], currentStreak[i]);
        } else {
          currentStreak[i] = 0;
        }
      }
    }

    // Detect strategy
    const formats = rounds[0]?.tables.map(t => t.sideA.length + t.sideB.length) || [];
    const allDoubles = formats.every(f => f === 4) && n % 2 === 0;
    const allSingles = formats.every(f => f === 2);
    const hasSitOuts = rounds.some(r => r.sittingOut && r.sittingOut.length > 0);

    let strategy;
    if (hasSitOuts) {
      strategy = 'Greedy with sit-out rotation';
    } else if ((allDoubles && formats.length >= 3) || allSingles) {
      strategy = 'Optimal (round-robin, unique pairings guaranteed)';
    } else {
      strategy = 'Best of N candidates (15s search)';
    }

    // Stopping reason
    const oppFull = oppCovered === oppPairs;
    const parFull = !hasPartnerFormats || parCovered === parPairs;
    let stoppedReason;
    if (rounds.length >= 40) {
      stoppedReason = 'Hit 40-round cap';
    } else if (oppFull && parFull) {
      stoppedReason = 'All pairs covered';
    } else {
      stoppedReason = 'All pairs covered';
    }

    // Imperfections
    const notes = [];
    if (!oppFull) notes.push(`${oppPairs - oppCovered} opponent pair${oppPairs - oppCovered > 1 ? 's' : ''} never met`);
    if (hasPartnerFormats && !parFull) notes.push(`${parPairs - parCovered} partner pair${parPairs - parCovered > 1 ? 's' : ''} never teamed up`);
    if (parRepeats.length > 0) notes.push(`${parRepeats.length} partner pairing${parRepeats.length > 1 ? 's' : ''} repeated (unavoidable for this config)`);
    if (oppMaxVal >= 4) notes.push(`Some opponents faced each other ${oppMaxVal} times`);

    const sitMin = Math.min(...sitOutPerPlayer);
    const sitMax = Math.max(...sitOutPerPlayer);
    const gamesMin = Math.min(...gamesPerPlayer);
    const gamesMax = Math.max(...gamesPerPlayer);

    return {
      strategy,
      roundCount: rounds.length,
      stoppedReason,
      formatDesc: [...new Set(formats.map(f => f === 4 ? 'doubles' : f === 3 ? '2v1' : 'singles'))].join(' + '),
      opponent: { covered: oppCovered, total: oppPairs, pct: Math.round(oppCovered / oppPairs * 100), max: oppMaxVal, repeats: oppRepeats },
      partner: hasPartnerFormats
        ? { covered: parCovered, total: parPairs, pct: Math.round(parCovered / parPairs * 100), max: parMaxVal, repeats: parRepeats }
        : null,
      fairness: {
        gamesMin, gamesMax,
        sitMin, sitMax, sitSpread: sitMax - sitMin,
        soloPerPlayer: players.map((p, i) => ({ name: p.name, solo: soloPerPlayer[i] })),
        maxSoloStreak: Math.max(...soloStreaks, 0),
        sitOutPerPlayer: players.map((p, i) => ({ name: p.name, sitOuts: sitOutPerPlayer[i] })),
        gamesPerPlayer: players.map((p, i) => ({ name: p.name, games: gamesPerPlayer[i] }))
      },
      notes
    };
  }

  // Expose for testing
  if (typeof globalThis !== 'undefined') {
    globalThis.Scheduler = { decideTableFormats, assignRound, generateSchedule, generateScheduleFullField, shuffleArray, analyseSchedule, PALETTE };
  }

  // ===== App State =====

  let nextColorIndex = 0;

  const state = {
    players: [],
    tableCount: 1,
    rounds: [],
    currentView: 'setup',
    currentRound: 0,
    allow2v1: true,
    showAllRounds: false,
    debugStats: null,
    showDebug: false
  };

  function isDebugMode() {
    return typeof location !== 'undefined' && new URLSearchParams(location.search).has('debug');
  }

  // ===== Render: Setup View =====

  function renderSetup() {
    const app = document.getElementById('app');
    const maxTables = Math.max(1, Math.floor(state.players.length / 2));
    const minTables = 1;
    if (state.tableCount > maxTables) state.tableCount = maxTables;
    if (state.tableCount < minTables) state.tableCount = minTables;

    app.innerHTML = `
      <div class="max-w-lg mx-auto px-4 py-8">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-white">Shuffle Pong</h1>
          <p class="text-gray-400 text-sm">Table Tennis Group Scheduler</p>
        </div>

        <div class="mb-6">
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Players</label>
          <div id="player-pills" class="flex flex-wrap gap-2 mb-3">
            ${state.players.map((p, i) => `
              <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}">
                ${escapeHtml(p.name)}
                <button onclick="removePlayer(${i})" title="Remove">&times;</button>
              </span>
            `).join('')}
          </div>
          <div class="flex gap-2">
            <input id="player-input" type="text" placeholder="Add player name..."
              class="flex-1 px-3 py-2 rounded-lg border border-gray-700 text-white text-sm focus:outline-none focus:border-blue-500"
              style="background: #16213e;"
              onkeydown="if(event.key==='Enter')addPlayer()">
            <button onclick="addPlayer()"
              class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-500">Add</button>
          </div>
          <p class="text-gray-400 text-xs mt-1">Press Enter to add, click &times; to remove</p>
        </div>

        <div class="mb-6">
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Tables Available</label>
          <div class="flex items-center gap-4">
            <button onclick="changeTableCount(-1)" ${state.tableCount <= minTables ? 'disabled' : ''}
              class="w-9 h-9 rounded-lg border border-gray-700 text-white text-lg ${state.tableCount <= minTables ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-700 cursor-pointer'}"
              style="background: #16213e;">−</button>
            <span class="text-2xl font-bold text-white min-w-[40px] text-center">${state.tableCount} / ${maxTables}</span>

              class="w-9 h-9 rounded-lg border border-gray-700 text-white text-lg ${state.tableCount >= maxTables ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-700 cursor-pointer'}"
              style="background: #16213e;">+</button>
          </div>
        </div>

        <div class="mb-6">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" ${state.allow2v1 ? 'checked' : ''}

            <span class="text-sm text-gray-300">Allow 2v1 format</span>
          </label>
        </div>

        <button onclick="generate()" ${state.players.length < 2 ? 'disabled' : ''}
          class="w-full py-3 rounded-xl text-white font-bold text-base ${state.players.length < 2 ? 'opacity-40 cursor-not-allowed' : 'hover:opacity-90 cursor-pointer'}"
          style="background: linear-gradient(135deg, #3498db, #2ecc71);">
          Generate Schedule →
        </button>

        <p class="text-center text-gray-400 text-xs mt-2">${getSummaryText()}</p>
      </div>
    `;

    if (state._focusInput) {
      document.getElementById('player-input')?.focus();
      state._focusInput = false;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function getSummaryText() {
    const n = state.players.length;
    if (n < 2) return 'Add at least 2 players to generate';
    const formats = decideTableFormats(n, state.tableCount, state.allow2v1);
    const capacity = formats.reduce((a, b) => a + b, 0);
    const sitOuts = n - capacity;
    const types = formats.map(f => f === 4 ? 'doubles' : f === 3 ? '2v1' : 'singles');
    const unique = [...new Set(types)].join(' + ');
    let text = `${n} players × ${formats.length} table${formats.length > 1 ? 's' : ''} → ${unique}`;
    if (sitOuts > 0) text += ` (${sitOuts} sit out per round)`;
    return text;
  }

  // ===== Render: Schedule View =====

  function renderSchedule() {
    const app = document.getElementById('app');
    const roundCount = state.rounds.length;

    app.innerHTML = `
      <div class="max-w-lg mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-xl font-bold text-white">Shuffle Pong</h1>
          <button onclick="editPlayers()"

        </div>

        <p class="text-gray-300 text-sm mb-4">

        </p>

        <div class="flex gap-2 mb-4">

            ${state.showAllRounds ? 'Show Current ▾' : 'Show All ▸'}
          </button>
        </div>

        ${(state.showAllRounds ? state.rounds : [state.rounds[state.currentRound]]).map((round, i) => {

                      </span>
                    `).join('')}
                  </div>
                  <span class="text-gray-300 font-bold text-sm mx-3">vs</span>
                  <div class="flex flex-col gap-1 items-start flex-1">
                    ${table.sideB.map(p => `
                      <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}; font-size: 13px; padding: 2px 10px;">
                        ${escapeHtml(p.name)}
                      </span>
                    `).join('')}
                  </div>
                </div>
              </div>
            `).join('')}
            ${(round.sittingOut && round.sittingOut.length > 0) ? `
              <div class="mt-3 pt-3 border-t border-gray-700 text-center">
                <span class="text-xs text-gray-300 uppercase tracking-wider">Sitting out</span>
                <div class="flex flex-wrap gap-1.5 mt-1.5 justify-center">
                  ${round.sittingOut.map(p => `
                    <span class="pill" style="background: ${PALETTE[p.colorIndex % PALETTE.length]}; font-size: 12px; padding: 2px 8px; opacity: 0.6;">
                      ${escapeHtml(p.name)}
                    </span>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        `}).join('')}

        ${state.debugStats ? `
          <button onclick="toggleDebug()"
            class="w-full py-1.5 text-xs text-gray-400 hover:text-gray-300 cursor-pointer"
            style="background: none; border: none;">
            ${state.showDebug ? '▾ Hide Debug' : '▸ Show Debug'}
          </button>
          ${state.showDebug ? renderDebugPanel(state.debugStats) : ''}
        ` : ''}
      </div>
    `;
  }

  // ===== URL Sync =====

  function updateURL() {
    const names = state.players.map(p => p.name);
    const hash = names.length ? '#' + names.map(n => encodeURIComponent(n)).join(',') : '';
    const params = new URLSearchParams();
    if (isDebugMode()) params.set('debug', '');
    if (state.tableCount !== 1) params.set('tables', state.tableCount);
    if (!state.allow2v1) params.set('allow2v1', 'false');
    const search = params.toString() ? '?' + params.toString() : '';
    history.replaceState(null, '', location.pathname + search + hash);
  }

  function loadPlayersFromURL() {
    const hash = location.hash.slice(1);
    if (hash) {
      const names = hash.split(',').map(n => decodeURIComponent(n)).filter(Boolean);
      for (const name of names) {
        if (state.players.length >= 14) break;
        if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) continue;
        state.players.push({ name, colorIndex: nextColorIndex++ });
      }
    }
    const params = new URLSearchParams(location.search);
    if (params.has('tables')) {
      const t = parseInt(params.get('tables'), 10);
      if (t >= 1 && t <= 7) state.tableCount = t;
    }
    if (params.has('allow2v1')) {
      state.allow2v1 = params.get('allow2v1') !== 'false';
    }
  }

  // ===== Event Handlers =====

  function addPlayer() {
    const input = document.getElementById('player-input');
    const name = input.value.trim();
    if (!name) return;
    if (state.players.length >= 14) return;
    if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) return;
    state.players.push({ name, colorIndex: nextColorIndex++ });
    state._focusInput = true;
    updateURL();
    renderSetup();
  }

  function removePlayer(index) {
    state.players.splice(index, 1);
    state._focusInput = true;
    updateURL();
    renderSetup();
  }

  function changeTableCount(delta) {
    const maxTables = Math.max(1, Math.floor(state.players.length / 2));
    const minTables = 1;
    state.tableCount = Math.max(minTables, Math.min(maxTables, state.tableCount + delta));
    updateURL();
    renderSetup();
  }

  function generate() {
    if (state.players.length < 2) return;

    // Show loading state
    const btn = document.querySelector('button[onclick="generate()"]');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Generating...';
      btn.style.background = '#555';
      btn.classList.add('cursor-wait', 'pointer-events-none', 'animate-pulse');
    }

    // Defer to next frame so UI updates before heavy computation
    setTimeout(() => {
      state.rounds = generateSchedule(state.players, state.tableCount, state.allow2v1);
      state.currentView = 'schedule';
      state.currentRound = 0;
      state.showAllRounds = false;
      state.debugStats = isDebugMode() ? analyseSchedule(state.players, state.rounds) : null;
      state.showDebug = false;
      renderSchedule();
    }, 20);
  }

  function nextRound() {
    state.currentRound = (state.currentRound + 1) % state.rounds.length;
    renderSchedule();
  }

  function editPlayers() {
    state.currentView = 'setup';
    state.rounds = [];
    state.currentRound = 0;
    state.showAllRounds = false;
    state.debugStats = null;
    state.showDebug = false;
    renderSetup();
    updateURL();
  }

  function toggleAllRounds() {
    state.showAllRounds = !state.showAllRounds;
    renderSchedule();
  }

  function toggle2v1() {
    state.allow2v1 = !state.allow2v1;
    updateURL();
    renderSetup();
  }

  function toggleDebug() {
    state.showDebug = !state.showDebug;
    renderSchedule();
  }

    const parSection = stats.partner
      ? `<div class="flex justify-between"><span class="text-gray-400">Partner coverage</span><span class="${stats.partner.pct === 100 ? 'text-green-400' : 'text-yellow-400'}">${stats.partner.covered}/${stats.partner.total} (${stats.partner.pct}%)</span></div>
         <div class="flex justify-between"><span class="text-gray-400">Max partner repeats</span><span class="${stats.partner.max <= 1 ? 'text-green-400' : 'text-yellow-400'}">${stats.partner.max}</span></div>
         ${stats.partner.repeats.length > 0 ? `<div class="text-xs text-yellow-400/70 ml-2">${stats.partner.repeats.map(r => `${r.a} + ${r.b} (${r.count}×)`).join(', ')}</div>` : ''}`
      : '<div class="flex justify-between"><span class="text-gray-400">Partner coverage</span><span class="text-gray-400">n/a (all singles)</span></div>';

         <div class="text-xs text-gray-400 ml-2">${stats.fairness.sitOutPerPlayer.filter(p => p.sitOuts > 0).map(p => `${p.name}: ${p.sitOuts}`).join(', ')}</div>`

         </div>`

           <div class="text-xs text-green-400">Perfect schedule — no compromises needed</div>

    return `
      <div class="card" style="border: 1px solid #333; background: #111827;">

          <div class="flex justify-between"><span class="text-gray-400">Opponent coverage</span><span class="${oppPct === 100 ? 'text-green-400' : 'text-yellow-400'}">${stats.opponent.covered}/${stats.opponent.total} (${oppPct}%)</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Max opponent repeats</span><span class="${stats.opponent.max <= 2 ? 'text-green-400' : 'text-yellow-400'}">${stats.opponent.max}</span></div>
          ${stats.opponent.repeats.length > 0 ? `<div class="text-xs text-yellow-400/70 ml-2">${stats.opponent.repeats.map(r => `${r.a} vs ${r.b} (${r.count}×)`).join(', ')}</div>` : ''}
          ${parSection}
        </div>

        <div class="mt-3 pt-2 border-t border-gray-700 space-y-1 text-xs">
          <div class="text-gray-300 font-medium mb-1">Fairness</div>
          <div class="flex justify-between"><span class="text-gray-400">Games per player</span><span class="${stats.fairness.gamesMax - stats.fairness.gamesMin <= 1 ? 'text-green-400' : 'text-yellow-400'}">${stats.fairness.gamesMin}–${stats.fairness.gamesMax}</span></div>
          ${sitSection}
          <div class="flex justify-between"><span class="text-gray-400">Max solo streak</span><span class="${stats.fairness.maxSoloStreak <= 3 ? 'text-green-400' : 'text-yellow-400'}">${stats.fairness.maxSoloStreak}</span></div>
        </div>

        ${notesSection}
      </div>
    `;
  }

  // ===== Init =====

  if (typeof document !== 'undefined') {
    loadPlayersFromURL();
    state._focusInput = true;
    renderSetup();
    updateURL();
  }

  </script>
</body>
</html>
